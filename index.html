<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nazrithm · Content Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="shell">
<div class="sb-overlay" id="sb-overlay" onclick="closeSidebar()"></div>

<!-- ══ SIDEBAR ══════════════════════════════ -->
<div class="sidebar" id="sidebar">
  <div class="sb-top">
    <div class="sb-brand">
      <div class="sb-logo">
        <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="14" rx="3.5" stroke="white" stroke-width="1.3"/><circle cx="8" cy="8" r="3" stroke="white" stroke-width="1.3"/><circle cx="12" cy="4" r="1" fill="white"/></svg>
      </div>
      <div>
        <div class="sb-name">Nazrithm</div>
        <div class="sb-tag">Content Planner Pro</div>
      </div>
    </div>
    <div class="sb-section">Clients</div>
  </div>

  <div class="clients-wrap" id="clients-wrap"></div>

  <button class="sb-add-btn" onclick="promptAddClient()">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Add client
  </button>

  <div class="sb-themes">
    <div class="sb-section" style="padding:0;margin-bottom:8px;">Theme</div>
    <div class="theme-row" id="theme-row"></div>
  </div>
</div>

<!-- ══ MAIN ══════════════════════════════════ -->
<div class="main">

  <!-- topbar -->
  <div class="topbar">
    <button class="sb-toggle" id="sb-toggle" onclick="toggleSidebar()" aria-label="Open menu">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M2 4h14M2 9h14M2 14h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="topbar-left">
      <div class="client-badge" id="client-badge">
        <div class="client-badge-dot" id="badge-dot"></div>
        <span id="badge-name">No client</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="month-nav">
        <button class="m-btn" onclick="changeMonth(-1)">&#8592;</button>
        <div class="m-label" id="m-label">April 2026</div>
        <button class="m-btn" onclick="changeMonth(1)">&#8594;</button>
      </div>
      <div class="view-tabs">
        <button class="v-tab active" onclick="switchView('calendar',this)">Calendar</button>
        <button class="v-tab" onclick="switchView('list',this)">List</button>
        <button class="v-tab" onclick="switchView('analytics',this)">Analytics</button>
      </div>
      <button class="act-btn" onclick="openAddModal(null)">
        <svg viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
        Add Post
      </button>
    </div>
  </div>

  <!-- content -->
  <div class="content" id="content">
    <!-- injected by JS -->
  </div>
</div>
</div>

<!-- ══ MODALS ════════════════════════════════ -->

<!-- Day / Add / Edit modal -->
<div class="overlay" id="overlay-post">
  <div class="modal">
    <div class="modal-hdr">
      <div>
        <div class="modal-ttl" id="m-title">Add Post</div>
        <div class="modal-sub" id="m-sub">Fill in the details</div>
      </div>
      <button class="x-btn" onclick="closePostModal()">&#215;</button>
    </div>

    <!-- existing posts for this day -->
    <div class="day-posts-list" id="day-posts-list"></div>

    <div id="form-area">
      <div class="field">
        <label>Date</label>
        <input type="date" id="f-date"/>
      </div>
      <div class="r2">
        <div class="field">
          <label>Post title</label>
          <input id="f-title" placeholder="e.g. Monday tips"/>
        </div>
        <div class="field">
          <label>Task / Reference</label>
          <input id="f-task" placeholder="e.g. Design brief"/>
        </div>
      </div>
      <div class="r2">
        <div class="field">
          <label>Type</label>
          <select id="f-type">
            <option value="">Select...</option>
            <option>Reel</option><option>Carousel</option><option>Static</option><option>Story</option><option>Collab</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="f-status">
            <option>Idea</option><option>In progress</option><option>Ready</option><option>Scheduled</option><option>Posted</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Caption draft</label>
        <textarea id="f-caption" placeholder="Write caption, hooks, or ideas..."></textarea>
      </div>
      <div class="field">
        <label>Hashtags</label>
        <input id="f-hashtags" placeholder="#brand #content"/>
      </div>
      <div class="field">
        <label>Visual / Design notes</label>
        <input id="f-notes" placeholder="e.g. Warm tones, show product in use"/>
      </div>
    </div>

    <div class="modal-acts">
      <button class="m-btn-del" id="btn-del-post" style="display:none" onclick="confirmDeletePost()">Delete post</button>
      <button class="m-btn-cancel" onclick="closePostModal()">Cancel</button>
      <button class="m-btn-save" id="btn-save-post" onclick="savePost()">Add Post</button>
    </div>
  </div>
</div>

<!-- Confirm delete -->
<div class="overlay" id="overlay-confirm">
  <div class="modal confirm-modal">
    <div class="modal-hdr">
      <div class="modal-ttl" id="confirm-ttl">Delete post?</div>
      <button class="x-btn" onclick="closeConfirm()">&#215;</button>
    </div>
    <p id="confirm-msg">This action cannot be undone.</p>
    <div class="modal-acts">
      <button class="m-btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="m-btn-del" style="margin:0;" id="confirm-ok" onclick="runConfirm()">Delete</button>
    </div>
  </div>
</div>

<!-- Add client -->
<div class="overlay" id="overlay-client">
  <div class="modal confirm-modal">
    <div class="modal-hdr">
      <div class="modal-ttl">Add client</div>
      <button class="x-btn" onclick="closeClientModal()">&#215;</button>
    </div>
    <div class="field">
      <label>Client / Brand name</label>
      <input id="f-client-name" placeholder="e.g. Lustréva" onkeydown="if(event.key==='Enter')saveClient()"/>
    </div>
    <div class="modal-acts">
      <button class="m-btn-cancel" onclick="closeClientModal()">Cancel</button>
      <button class="m-btn-save" onclick="saveClient()">Add Client</button>
    </div>
  </div>
</div>


<script src="app.js"></script>
</body>
</html>
